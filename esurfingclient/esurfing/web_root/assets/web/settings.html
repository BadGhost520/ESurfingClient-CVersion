<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/vector/settings.svg" />
    <link rel="stylesheet" href="/css/basic.css" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/settings.css">
    <title>设置</title>
  </head>
  <body>
    <div id="main">
      <!-- 侧栏 -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <span>ESurfingClient</span>
          <div id="short-switch">
            <img src="/vector/more.svg" alt="更多列表" />
          </div>
        </div>
        <hr />
        <ul id="sidebar-navs">
          <li id="dashboard">
            <img src="/vector/dashboard.svg" alt="仪表板" /><span>仪表板</span>
          </li>
          <li id="logs">
            <img src="/vector/logs.svg" alt="日志" /><span>日志</span>
          </li>
          <li id="settings" class="on">
            <img src="/vector/settings.svg" alt="设置" /><span>设置</span>
          </li>
          <li id="about">
            <img src="/vector/about.svg" alt="关于" /><span>关于</span>
          </li>
        </ul>
      </aside>
      <!-- 内容 -->
      <div id="content">
        <div class="card thread1">
          <div class="card-title">线程 1 设置</div>
          <div>
            <div class="form-group readonly-group">
              <label for="static1-usr">用户名</label>
              <input id="static1-usr" type="text" value="未知" readonly />
            </div>
            <div class="form-group readonly-group">
              <label for="static1-pwd">密码</label>
              <input id="static1-pwd" type="password" value="未知" readonly />
            </div>
            <div class="form-group radio-group">
              <label>认证通道</label>
              <div id="static1-chn-pc" class="choose-btn static">PC</div>
              <div id="static1-chn-phone" class="choose-btn static">Phone</div>
            </div>
          </div>
          <div id="thread1-change-btn" class="change-btn">
            更改设置
          </div>
        </div>
        <div class="card thread2">
          <div class="card-title">线程 2 设置</div>
          <div>
            <div class="form-group readonly-group">
              <label for="static2-usr">用户名</label>
              <input id="static2-usr" type="text" value="未知" readonly />
            </div>
            <div class="form-group readonly-group">
              <label for="static2-pwd">密码</label>
              <input id="static2-pwd" type="password" value="未知" readonly />
            </div>
            <div class="form-group radio-group">
              <label>认证通道</label>
              <div id="static2-chn-pc" class="choose-btn static">PC</div>
              <div id="static2-chn-phone" class="choose-btn static">Phone</div>
            </div>
          </div>
          <div id="thread2-change-btn" class="change-btn">
            更改设置
          </div>
        </div>
        <div class="card log-settings">
          <div class="card-title">日志设置</div>
          <div class="form-group radio-group">
            <label>调试模式</label>
            <div id="static-debug-on" class="choose-btn static">开启</div>
            <div id="static-debug-off" class="choose-btn static">关闭</div>
          </div>
        </div>
      </div>
      <div id="modal">
        <div id="modal-container">
          <div id="modal-title">更改设置</div>
          <form id="forms">
            <div class="form-group">
              <label for="usr">用户名</label>
              <input id="usr" type="text" name="username" required />
            </div>
            <div class="form-group">
              <label for="pwd">密码</label>
              <input id="pwd" type="password" name="password" required />
            </div>
            <div class="form-group radio-group">
              <label>认证通道</label>
              <input id="chn" type="hidden" name="channel" value="phone" />
              <div id="channel-pc" class="choose-btn">PC</div>
              <div id="channel-phone" class="choose-btn btnon">Phone</div>
            </div>
            <div class="form-group radio-group">
              <label>调试模式</label>
              <input id="debug" type="hidden" name="debug" value="0" />
              <div id="debug-on" class="choose-btn">开启</div>
              <div id="debug-off" class="choose-btn btnon">关闭</div>
            </div>
            <div class="form-group radio-group">
              <label>小容量设备模式</label>
              <input id="smallDevice" type="hidden" name="smallDevice" value="0" />
              <div id="small-device-on" class="choose-btn">开启</div>
              <div id="small-device-off" class="choose-btn btnon">关闭</div>
            </div>
          </form>
          <div class="modal-btns">
            <div id="cancel" class="choose-btn">取消</div>
            <div id="submit" class="choose-btn btnon">确定</div>
          </div>
        </div>
      </div>
    </div>
    <div class="loading-modal">
      <div class="loading-container">
        <img src="/vector/loading.svg" alt="加载中">
        <span>正在等待配置应用...30s</span>
      </div>
    </div>
    <script src="/js/basic.js"></script>
    <script src="/import-js/axios.min.js"></script>
    <script src="/js/settings.js"></script>
  </body>
</html>
