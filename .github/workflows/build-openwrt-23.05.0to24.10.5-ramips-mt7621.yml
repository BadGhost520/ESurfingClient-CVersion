name: Build OpenWrt 24.10.5 ramips-mt7621 Package with Dependencies

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  build-openwrt-offline-repo:
    runs-on: ubuntu-latest
    container:
      image: debian:11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          apt-get update && apt-get install -y $PACKAGES

      - name: Download and extract SDK
        run: |
          SDK_URL="https://mirrors.sustech.edu.cn/openwrt/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          tar -I zstd -xf openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

      - name: Copy package source to SDK
        run: |
          # 复制你的程序包
          cp -r esurfingclient openwrt-sdk/package/
          
          # 如果有本地源码压缩包，也复制过去
          if [ -f esurfingclient.tar.gz ]; then
            cp esurfingclient.tar.gz openwrt-sdk/dl/
          fi

      - name: Configure build
        run: |
          cd openwrt-sdk
          
          # 更新 feeds
          scripts/feeds update -a
          scripts/feeds install -a
          
          # 使用默认配置 + 选中需要的包
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_generic=y" >> .config
          
          # 选中你的包（会自动选中依赖）
          echo "CONFIG_PACKAGE_esurfingclient=y" >> .config
          echo "CONFIG_PACKAGE_libcurl=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          
          # 关闭内核配置检查（加速编译）
          echo "CONFIG_KERNEL_KALLSYMS=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_KERNEL=n" >> .config
          
          # 生成完整配置
          make defconfig

      - name: Compile all packages
        run: |
          cd openwrt-sdk
          # 编译你的包（会自动编译依赖）
          make package/esurfingclient/compile V=sc -j$(nproc)

      - name: Collect required packages
        run: |
          cd openwrt-sdk

          # 创建离线仓库目录
          mkdir -p offline-repo

          # 根据依赖树，需要打包的包列表
          # 直接依赖
          PACKAGES="esurfingclient libcurl libopenssl ca-bundle"
          # 间接依赖
          PACKAGES="$PACKAGES libmbedtls libnghttp libatomic libgcc"

          # 复制所有需要的包
          find bin/packages -name "*.ipk" | sort
          for pkg in $PACKAGES; do
              # 查找对应的 ipk 文件（可能带版本号）
              pkg_file=$(find bin/packages -name "${pkg}_*.ipk" 2>/dev/null | head -1)
              if [ -n "$pkg_file" ]; then
                  cp "$pkg_file" offline-repo/
                  echo "✅ 添加: $(basename "$pkg_file")"
              else
                  # 尝试其他可能的命名方式
                  pkg_file=$(find bin/packages -name "${pkg}.ipk" 2>/dev/null | head -1)
                  if [ -n "$pkg_file" ]; then
                      cp "$pkg_file" offline-repo/
                      echo "✅ 添加: $(basename "$pkg_file")"
                  else
                      echo "⚠️ 警告: 找不到 $pkg"
                  fi
              fi
          done

          echo ""
          echo "📦 打包的文件列表："
          ls -la offline-repo/

          echo ""
          echo "📊 文件数量: $(ls offline-repo/*.ipk 2>/dev/null | wc -l)"
          echo "💾 总大小: $(du -sh offline-repo/ | cut -f1)"

      - name: Create offline bundle
        run: |
          cd openwrt-sdk

          # 打包
          tar -czf ../esurfingclient-offline-repo.tar.gz offline-repo/

          echo "✅ 离线包创建完成"
          echo "📦 压缩包大小: $(ls -lh ../esurfingclient-offline-repo.tar.gz | cut -d' ' -f5)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-offline-repo-ramips-mt7621
          path: esurfingclient-offline-repo.tar.gz
          retention-days: 30