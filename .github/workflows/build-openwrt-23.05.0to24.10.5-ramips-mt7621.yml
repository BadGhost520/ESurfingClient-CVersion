name: Build OpenWrt 23.05.0 to 24.10.6 ramips-mt7621 Package with Dependencies

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  build-openwrt-offline-repo:
    runs-on: ubuntu-latest
    container:
      image: debian:11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          apt-get update && apt-get install -y $PACKAGES

      - name: Download and extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/ramips/mt7621/openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          tar -I zstd -xf openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

      - name: Copy package source to SDK
        run: |
          cp -r esurfingclient openwrt-sdk/package/
          
          if [ -f esurfingclient.tar.gz ]; then
            cp esurfingclient.tar.gz openwrt-sdk/dl/
          fi

      - name: Configure build
        run: |
          cd openwrt-sdk
          
          scripts/feeds update -a
          scripts/feeds install -a
          
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_generic=y" >> .config
          
          echo "CONFIG_PACKAGE_esurfingclient=y" >> .config
          echo "CONFIG_PACKAGE_libcurl=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          
          echo "CONFIG_KERNEL_KALLSYMS=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_KERNEL=n" >> .config
          
          make defconfig

      - name: Compile all packages
        run: |
          cd openwrt-sdk
          make package/esurfingclient/compile V=sc -j$(nproc)

      - name: Collect required packages
        run: |
          cd openwrt-sdk

          mkdir -p offline-repo

          wget -P offline-repo "https://mirrors.sustech.edu.cn/openwrt/releases/24.10.6/packages/mipsel_24kc/packages/libnghttp2-14_1.63.0-r1_mipsel_24kc.ipk"
          wget -P offline-repo "https://mirrors.sustech.edu.cn/openwrt/releases/24.10.6/packages/mipsel_24kc/packages/libcurl4_8.12.1-r1_mipsel_24kc.ipk"
          wget -P offline-repo "https://mirrors.sustech.edu.cn/openwrt/releases/24.10.6/packages/mipsel_24kc/base/libopenssl3_3.0.19-r1_mipsel_24kc.ipk"
          wget -P offline-repo "https://downloads.openwrt.org/releases/24.10.6/targets/ramips/mt7621/packages/libatomic1_13.3.0-r4_mipsel_24kc.ipk"
          cp bin/packages/mipsel_24kc/base/esurfingclient_2.0.0-r1_mipsel_24kc.ipk offline-repo/
          
          echo ""
          echo "📦 打包的文件列表："
          ls -la offline-repo/

          echo ""
          echo "📊 文件数量: $(ls offline-repo/*.ipk 2>/dev/null | wc -l)"
          echo "💾 总大小: $(du -sh offline-repo/ | cut -f1)"

      - name: Create offline bundle
        run: |
          cd openwrt-sdk

          # 打包
          tar -czf ../esurfingclient-offline-repo.tar.gz offline-repo/*

          echo "✅ 离线包创建完成"
          echo "📦 压缩包大小: $(ls -lh ../esurfingclient-offline-repo.tar.gz | cut -d' ' -f5)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-offline-repo-ramips-mt7621
          path: esurfingclient-offline-repo.tar.gz
          retention-days: 30