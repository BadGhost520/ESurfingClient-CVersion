name: Build OpenWrt 19.07.0 to 22.03.7 x86 64 Package with Dependencies

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  build-openwrt-offline-repo:
    runs-on: ubuntu-latest
    container:
      image: debian:11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync wget ca-certificates unzip file python3-setuptools swig"
          apt-get update && apt-get install -y $PACKAGES

      - name: Download and extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz"
          wget "$SDK_URL"
          tar -xf openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          mv openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64 openwrt-sdk

      - name: Copy package source to SDK
        run: |
          cp -r esurfingclient openwrt-sdk/package/
          
          if [ -f esurfingclient.tar.gz ]; then
            cp esurfingclient.tar.gz openwrt-sdk/dl/
          fi

      - name: Configure build
        run: |
          cd openwrt-sdk

          scripts/feeds update -a
          scripts/feeds install -a

          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config

          echo "CONFIG_PACKAGE_esurfingclient=y" >> .config
          echo "CONFIG_PACKAGE_libcurl=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config

          # 关键：禁用 mbedTLS，使用 OpenSSL
          echo "CONFIG_LIBCURL_MBEDTLS=n" >> .config
          echo "CONFIG_LIBCURL_OPENSSL=y" >> .config
          echo "CONFIG_LIBCURL_WOLFSSL=n" >> .config
          echo "CONFIG_LIBCURL_GNUTLS=n" >> .config
          
          # 确保 OpenSSL 被选中
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config

          # 关键：禁用 HTTP/2
          echo "CONFIG_LIBCURL_HTTP2=n" >> .config
          echo "CONFIG_LIBCURL_NGHTTP2=n" >> .config
          echo "CONFIG_PACKAGE_libnghttp2=n" >> .config

          echo "CONFIG_KERNEL_KALLSYMS=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_KERNEL=n" >> .config

          make defconfig

      - name: Compile openssl
        run: |
          cd openwrt-sdk
          make package/openssl/compile V=sc -j$(nproc)

      - name: Compile curl
        run: |
          cd openwrt-sdk
          make package/curl/compile V=sc -j$(nproc)

      - name: Compile nghttp2
        run: |
          cd openwrt-sdk
          make package/nghttp2/compile V=sc -j$(nproc)

      - name: Compile esurfingclient
        run: |
          cd openwrt-sdk
          make package/esurfingclient/compile V=sc -j$(nproc)

      - name: Collect required packages
        run: |
          cd openwrt-sdk

          mkdir -p esurfingclient-packages

          find bin/packages -name "esurfingclient*.ipk" -exec cp {} esurfingclient-packages/ \;

          download_pkg() {
            local url=$1
            local pkg=$2
            local dir=$3

            wget -q -r -l1 -nd -A "${pkg}_*.ipk" "$url/$dir/" -P esurfingclient-packages/ 2>/dev/null || true
          }

          BASE_URL="https://downloads.openwrt.org/releases/22.03.7/packages/x86_64"
          TARGET_URL="https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/packages"

          download_pkg "$BASE_URL" "libnghttp2-14" "packages"
          download_pkg "$BASE_URL" "libcurl4" "packages"
          download_pkg "$BASE_URL" "libopenssl1.1" "base"
          download_pkg "$TARGET_URL" "libatomic1" "."

          echo "📦 打包的文件："
          ls -la esurfingclient-packages/

      - name: Create offline bundle
        run: |
          cd openwrt-sdk

          # 打包
          tar -czf ../esurfingclient-openwrt-22.03.7-x86-64.tar.gz esurfingclient-packages/

          echo "✅ 离线包创建完成"
          echo "📦 压缩包大小: $(ls -lh ../esurfingclient-openwrt-22.03.7-x86-64.tar.gz | cut -d' ' -f5)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-openwrt-22.03.7-x86-64
          path: esurfingclient-openwrt-22.03.7-x86-64.tar.gz
          retention-days: 30