name: Build OpenWrt ramips_mt7621 Package

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-openwrt-offline-repo:
    runs-on: ubuntu-latest
    container:
      image: debian:11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          
          for i in 1 2 3; do
            echo "Attempt $i: Installing $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ All packages installed"
              break
            fi
            echo "❌ Attempt $i failed"
            sleep 3
          done

      - name: Download and extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/ramips/mt7621/openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          tar -I zstd -xf openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk
          
          cp -r esurfingclient openwrt-sdk/package/
          
          if [ -f esurfingclient.tar.gz ]; then
            cp esurfingclient.tar.gz openwrt-sdk/dl/
          fi

      - name: Configure build
        run: |
          cd openwrt-sdk

          scripts/feeds update packages
          
          scripts/feeds install libopenssl
          scripts/feeds install libcurl
          scripts/feeds install libatomic
          
          make defconfig
          
          cat >> .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          # CONFIG_LIBCURL_FTP is not set
          # CONFIG_LIBCURL_MBEDTLS is not set
          # CONFIG_LIBCURL_NGHTTP2 is not set
          CONFIG_LIBCURL_OPENSSL=y
          # CONFIG_OPENSSL_WITH_CHACHA_POLY1305 is not set
          # CONFIG_OPENSSL_WITH_CMS is not set
          # CONFIG_OPENSSL_WITH_IDEA is not set
          # CONFIG_OPENSSL_WITH_MDC2 is not set
          # CONFIG_OPENSSL_WITH_PSK is not set
          # CONFIG_OPENSSL_WITH_SEED is not set
          # CONFIG_OPENSSL_WITH_SRP is not set
          # CONFIG_OPENSSL_WITH_WHIRLPOOL is not set
          CONFIG_PACKAGE_libatomic=y
          CONFIG_PACKAGE_libcurl=y
          CONFIG_PACKAGE_libopenssl=y
          # CONFIG_PACKAGE_libopenssl-afalg is not set
          # CONFIG_PACKAGE_libopenssl-afalg_sync is not set
          # CONFIG_PACKAGE_libopenssl-devcrypto is not set
          EOF

          make defconfig

      - name: Compile libopenssl
        run: |
          cd openwrt-sdk
          make package/openssl/compile V=sc -j$(nproc)

      - name: Compile libcurl
        run: |
          cd openwrt-sdk
          make package/curl/compile V=sc -j$(nproc)

      - name: Compile esurfingclient
        run: |
          cd openwrt-sdk
          make package/esurfingclient/compile V=sc -j$(nproc)

      - name: Copy unstripped binary
        run: |
          cd openwrt-sdk
          find build_dir -name "ESurfingClient" -type f -exec cp {} ../ESurfingClient-ramips_mt7621-openwrt-debug \;
          file ../ESurfingClient-ramips_mt7621-openwrt-debug

      - name: Collect required packages
        run: |
          cd openwrt-sdk

          find bin/packages -name "esurfingclient*.ipk" -exec cp {} ../esurfingclient-ramips_mt7621-openwrt.ipk \;

      - name: zip
        run: |
          mkdir test
          cp ESurfingClient-ramips_mt7621-openwrt-debug test/
          cp esurfingclient-ramips_mt7621-openwrt.ipk test/
          tar -czf esurfingclient-ramips_mt7621-openwrt.tar.gz test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-ramips_mt7621-openwrt
          path: esurfingclient-ramips_mt7621-openwrt.tar.gz
          retention-days: 30