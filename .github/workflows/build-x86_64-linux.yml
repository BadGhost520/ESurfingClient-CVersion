name: Build x86_64 Linux Binary

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-x64-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04  # 使用 Ubuntu 22.04 替代 Debian 11，包更全

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            wget \
            ca-certificates \
            libssl-dev \
            pkg-config \
            file \
            upx-ucl \
            binutils \
            ldd
          # libcurl 和 OpenSSL 使用系统包，不自己编译
          apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev

      - name: Configure and build ESurfingClient
        run: |
          echo "🏗️ Starting x64 Linux build process"
          
          # 进入源码目录
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring"
          # 创建构建目录
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_SHARED_LIBS=OFF
          
          echo "🔨 Building..."
          make -j$(nproc)
          
          # 查找并复制可执行文件
          if [ -f "ESurfingClient" ]; then
            cp ESurfingClient ../../../ESurfingClient-x86_64-linux
          else
            echo "❌ 找不到 ESurfingClient"
            exit 1
          fi
          
          cd ../../..

      - name: Strip and compress
        run: |
          echo "🛡️ Stripping binary"
          strip --strip-all ESurfingClient-x86_64-linux
          
          echo "📦 Compressing with UPX"
          upx --best --ultra-brute ESurfingClient-x86_64-linux 2>/dev/null || \
          upx --best ESurfingClient-x86_64-linux
          
          echo "✅ Final binary size: $(du -h ESurfingClient-x86_64-linux | cut -f1)"

      - name: Verify build output
        run: |
          echo "🔍 Verifying build output"
          file ESurfingClient-x86_64-linux
          ldd ESurfingClient-x86_64-linux || echo "静态链接或无动态依赖"
          echo "📏 文件大小: $(du -h ESurfingClient-x86_64-linux | cut -f1)"

      - name: Create package
        run: |
          tar -czf esurfingclient-x64-linux.tar.gz ESurfingClient-x86_64-linux
          echo "📦 打包完成: esurfingclient-x64-linux.tar.gz"
          ls -lh esurfingclient-x64-linux.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-x64-linux
          path: esurfingclient-x64-linux.tar.gz
          retention-days: 30