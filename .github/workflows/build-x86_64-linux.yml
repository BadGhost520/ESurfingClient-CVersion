name: Build x86_64 Linux Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      full_version:
        required: true
        type: string
      curl_version:
        required: true
        type: string

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="build-essential cmake wget gcc g++ make upx-ucl binutils libcurl4-openssl-dev libssl-dev libcrypto++-dev zlib1g-dev libkrb5-dev file libzstd-dev"

          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 获取 libcurl 缓存
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/libcurl.a
            /usr/local/include/curl
          key: curl-${{ inputs.curl_version }}-openssl

      - name: 构建 libcurl 静态链接库
        run: |
          wget https://curl.se/download/curl-${{ inputs.curl_version }}.tar.gz
          tar -xzf curl-${{ inputs.curl_version }}.tar.gz
          cd curl-${{ inputs.curl_version }}
          
          ./configure --prefix=/usr/local \
            --enable-static \
            --disable-shared \
            --without-ssl \
            --enable-http \
            --enable-proxy \
            --enable-cookies \
            --enable-basic-auth \
            --enable-digest-auth \
            --disable-ftp \
            --disable-file \
            --disable-ldap \
            --disable-ldaps \
            --disable-rtsp \
            --disable-dict \
            --disable-telnet \
            --disable-tftp \
            --disable-pop3 \
            --disable-imap \
            --disable-smb \
            --disable-smtp \
            --disable-gopher \
            --disable-mqtt \
            --disable-websockets \
            --disable-bearer-auth \
            --disable-kerberos-auth \
            --disable-negotiate-auth \
            --disable-ntlm \
            --disable-tls-srp \
            --disable-aws \
            --disable-rtmp \
            --without-brotli \
            --without-zstd \
            --without-libpsl \
            --without-libssh2 \
            --without-librtmp \
            --without-libidn2 \
            --without-nghttp2 \
            --without-ngtcp2 \
            --without-nghttp3 \
            --without-quiche \
            --without-msh3 \
            --without-libgsasl \
            --without-libssh \
            --without-wolfssh \
            --without-hyper \
            --without-zlib \
            --disable-ares \
            --disable-rt \
            --disable-threaded-resolver \
            --disable-ipv6 \
            --disable-unix-sockets \
            --disable-manual \
            --disable-docs \
            --disable-verbose \
            --disable-versioned-symbols
          
          make -j$(nproc)
          make install
          
          export CMAKE_PREFIX_PATH=/usr/local:$CMAKE_PREFIX_PATH

      - name: 构建 ESurfingClient 程序
        run: |
          cd esurfingclient/esurfing
          
          cmake -DCMAKE_VERBOSE_MAKEFILE=ON \
                -DCMAKE_BUILD_TYPE=Release \
                .
          
          make -j$(nproc)
          
          cp ESurfingClient ../../ESurfingClient-${{ inputs.full_version }}-linux-x86_64
          
          upx --best --lzma ../../ESurfingClient-${{ inputs.full_version }}-linux-x86_64
          
          ls -lh ../../ESurfingClient-${{ inputs.full_version }}-linux-x86_64

      - name: 验证
        run: |
          if [ -f "ESurfingClient-${{ inputs.full_version }}-linux-x86_64" ]; then
            echo "✅ 构建成功"
            echo "📏 文件大小: $(du -h ESurfingClient-${{ inputs.full_version }}-linux-x86_64 | cut -f1)"
            file ESurfingClient-${{ inputs.full_version }}-linux-x86_64
          else
            echo "❌ 未找到二进制文件"
            exit 1
          fi

      - name: 打包成 tar.gz 压缩包
        run: |
          tar -czf esurfingclient-${{ inputs.full_version }}-linux-x86_64.tar.gz ESurfingClient-${{ inputs.full_version }}-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-${{ inputs.full_version }}-linux-x86_64
          path: esurfingclient-${{ inputs.full_version }}-linux-x86_64.tar.gz
          retention-days: 30