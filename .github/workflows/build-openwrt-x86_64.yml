name: Build OpenWrt x86_64 Package

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-openwrt-x86_64:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          
          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 下载并解压 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          tar -I zstd -xf openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk
          
          cp -r esurfingclient openwrt-sdk/package/
          
          if [ -f esurfingclient.tar.gz ]; then
            cp esurfingclient.tar.gz openwrt-sdk/dl/
          fi

      - name: 准备构建配置
        run: |
          cd openwrt-sdk

          scripts/feeds update base
          scripts/feeds update packages
          
          scripts/feeds install openssl
          scripts/feeds install curl

          make defconfig
          
          cat >> .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          # CONFIG_LIBCURL_FTP is not set
          # CONFIG_LIBCURL_MBEDTLS is not set
          # CONFIG_LIBCURL_NGHTTP2 is not set
          CONFIG_LIBCURL_OPENSSL=y
          # CONFIG_OPENSSL_WITH_CHACHA_POLY1305 is not set
          # CONFIG_OPENSSL_WITH_CMS is not set
          # CONFIG_OPENSSL_WITH_IDEA is not set
          # CONFIG_OPENSSL_WITH_MDC2 is not set
          # CONFIG_OPENSSL_WITH_PSK is not set
          # CONFIG_OPENSSL_WITH_SEED is not set
          # CONFIG_OPENSSL_WITH_SRP is not set
          # CONFIG_OPENSSL_WITH_TLS13 is not set
          # CONFIG_OPENSSL_WITH_WHIRLPOOL is not set
          CONFIG_PACKAGE_libcurl=y
          CONFIG_PACKAGE_libopenssl=y
          # CONFIG_PACKAGE_libopenssl-afalg is not set
          # CONFIG_PACKAGE_libopenssl-afalg_sync is not set
          # CONFIG_PACKAGE_libopenssl-devcrypto is not set
          # CONFIG_PACKAGE_libopenssl-padlock is not set
          EOF

          make defconfig

      - name: 编译 libopenssl
        run: |
          cd openwrt-sdk
          make package/openssl/compile V=sc -j$(nproc)

      - name: 编译 libcurl
        run: |
          cd openwrt-sdk
          make package/curl/compile V=sc -j$(nproc)

      - name: 编译 esurfingclient
        run: |
          cd openwrt-sdk
          make package/esurfingclient/compile V=sc -j$(nproc)
          
          find bin/packages -name "esurfingclient*.ipk" -exec cp {} ../esurfingclient-x86_64-openwrt.ipk \;

      - name: 复制可调试的二进制文件
        run: |
          cd openwrt-sdk
          find build_dir -name "ESurfingClient" -type f -exec cp {} ../ESurfingClient-x86_64-openwrt-debug \;
          file ../ESurfingClient-x86_64-openwrt-debug

      - name: 打包成 tar.gz 压缩包
        run: |
          mkdir test
          cp ESurfingClient-x86_64-openwrt-debug test/
          cp esurfingclient-x86_64-openwrt.ipk test/
          tar -czf esurfingclient-x86_64-openwrt.tar.gz test

      - name: 上传工件
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-x86_64-openwrt
          path: esurfingclient-x86_64-openwrt.tar.gz
          retention-days: 30