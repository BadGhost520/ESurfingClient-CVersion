name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-curl-winssl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-upx

      - name: Build ESurfingClient (Static)
        shell: msys2 {0}
        env:
          PKG_CONFIG_ALL_STATIC: 1
        run: |
          echo "🏗️ Starting Windows x64 static build"
          
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring"
          mkdir -p build && cd build
          
          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DCURL_USE_STATIC_LIBS=ON \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
            -DCMAKE_C_FLAGS="-DCURL_STATICLIB" \
            ..
          
          echo "🔨 Building..."
          mingw32-make -j$(nproc)
          
          cd ..
          
          # 移动并重命名可执行文件
          if [ -f "build/ESurfingClient.exe" ]; then
            cp build/ESurfingClient.exe ESurfingClient-x86_64-windows.exe
            echo "✅ Build successful"
          else
            echo "❌ ESurfingClient.exe not found"
            exit 1
          fi

      - name: Strip and compress
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          
          echo "🛡️ Stripping debug symbols"
          strip --strip-all ESurfingClient-x86_64-windows.exe
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ESurfingClient-x86_64-windows.exe 2>/dev/null || \
          upx --best ESurfingClient-x86_64-windows.exe
          
          echo "📊 Final size: $(du -h ESurfingClient-x86_64-windows.exe | cut -f1)"
          
          # 移动到根目录
          cp ESurfingClient-x86_64-windows.exe ../../

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f "ESurfingClient-x86_64-windows.exe" ]; then
            echo "❌ Build failed: executable not found"
            exit 1
          fi
          
          echo "✅ Build successful!"
          echo "📏 File size: $(du -h ESurfingClient-x86_64-windows.exe | cut -f1)"
          
          # 检查依赖（应该只有系统 DLL）
          echo "🔍 Checking dependencies:"
          objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name" | grep -v "KERNEL32\|MSVCRT\|USER32\|ADVAPI32" || \
          echo "✅ Only system DLLs found (good)"


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESurfingClient-x86_64-windows
          path: ESurfingClient-x86_64-windows.exe
          retention-days: 30