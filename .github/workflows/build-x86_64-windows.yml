name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-x64-windows:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install packages with retry
        run: |
          # 安装多个包，最多重试3次
          PACKAGES="cmake make ninja-build gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 mingw-w64-tools upx-ucl wget file zip perl libperl-dev"

          for i in 1 2 3; do
            echo "Attempt $i: Installing $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ All packages installed"
              break
            fi
            echo "❌ Attempt $i failed"
            sleep 3
          done

      - name: Create toolchain
        run: |
          cd esurfingclient/esurfing
          
          cat > toolchain-mingw64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
          
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          
          cat toolchain-mingw64.cmake

      - name: Build libopenssl
        run: |
          cd /tmp
          wget https://github.com/openssl/openssl/releases/download/openssl-3.5.6/openssl-3.5.6.tar.gz
          tar -xzf openssl-3.5.6.tar.gz
          cd openssl-3.5.6
          
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=/usr/x86_64-w64-mingw32 \
            --libdir=lib \
            no-shared \
            no-tests \
            no-docs \
            \
            no-bf \
            no-cast \
            no-idea \
            no-rc2 \
            no-rc4 \
            no-rc5 \
            no-seed \
            no-aria \
            no-camellia \
            no-sm2 \
            no-sm3 \
            no-mdc2 \
            no-rmd160 \
            no-whirlpool \
            no-blake2 \
            no-md4 \
            no-dtls \
            no-quic \
            no-sctp \
            no-srp \
            no-zlib \
            no-zstd \
            no-brotli \
            no-ktls \
            no-rdrand \
            no-asan \
            no-msan \
            no-ubsan \
            no-trace \
            no-egd \
            no-krb5kdf \
            no-scrypt \
            no-ssh-kdf \
            no-x942kdf \
            no-x963kdf \
            no-srtp \
            no-ocsp \
            no-cms \
            no-ts \
            no-tls \
            no-ssl
          
          make -j$(nproc)
          make install
          
          # 验证 OpenSSL 静态库
          if [ -f "/usr/x86_64-w64-mingw32/lib/libcrypto.a" ] && [ -f "/usr/x86_64-w64-mingw32/lib/libssl.a" ]; then
            echo "✅ OpenSSL static libraries installed"
            ls -la /usr/x86_64-w64-mingw32/lib/libcrypto.a
            ls -la /usr/x86_64-w64-mingw32/lib/libssl.a
          else
            echo "❌ OpenSSL libraries not found!"
            exit 1
          fi

      - name: Build libcurl
        run: |
          cd /tmp
          wget https://curl.se/download/curl-8.20.0.tar.gz
          tar -xzf curl-8.20.0.tar.gz
          cd curl-8.20.0
          
          ./configure --host=x86_64-w64-mingw32 \
            --prefix=/usr/x86_64-w64-mingw32 \
            --enable-static \
            --disable-shared \
            --without-ssl \
            \
            --enable-http \
            --enable-proxy \
            --enable-cookies \
            --enable-basic-auth \
            --enable-digest-auth \
            \
            --disable-ftp \
            --disable-file \
            --disable-ldap \
            --disable-ldaps \
            --disable-rtsp \
            --disable-dict \
            --disable-telnet \
            --disable-tftp \
            --disable-pop3 \
            --disable-imap \
            --disable-smb \
            --disable-smtp \
            --disable-gopher \
            --disable-mqtt \
            --disable-websockets \
            \
            --disable-bearer-auth \
            --disable-kerberos-auth \
            --disable-negotiate-auth \
            --disable-ntlm \
            --disable-tls-srp \
            --disable-aws \
            --disable-rtmp \
            \
            --without-brotli \
            --without-zstd \
            --without-libpsl \
            --without-libssh2 \
            --without-librtmp \
            --without-libidn2 \
            --without-nghttp2 \
            --without-ngtcp2 \
            --without-nghttp3 \
            --without-quiche \
            --without-msh3 \
            --without-libgsasl \
            --without-libssh \
            --without-wolfssh \
            --without-hyper \
            --without-zlib \
            \
            --disable-ares \
            --disable-rt \
            --disable-threaded-resolver \
            --disable-ipv6 \
            --disable-manual \
            --disable-docs \
            --disable-verbose \
            --disable-versioned-symbols \
            --disable-sspi
          
          make -j$(nproc)
          make install
          
          # 确认 libcurl.a 存在
          if [ -f "/usr/x86_64-w64-mingw32/lib/libcurl.a" ]; then
            echo "✅ libcurl.a successfully installed"
            ls -la /usr/x86_64-w64-mingw32/lib/libcurl.a
          else
            echo "❌ libcurl.a not found!"
            exit 1
          fi

      - name: Build ESurfingClient
        run: |
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring with Ninja"
          cmake -G Ninja \
            -B build \
            -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw64.cmake \
            -DBUILD_SHARED_LIBS=OFF
          
          echo "🔨 Building with Ninja"
          cmake --build build --target ESurfingClient -j$(nproc)
          
          echo "📦 Copying executable"
          cp build/ESurfingClient.exe ../../ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          x86_64-w64-mingw32-objdump -p ../../ESurfingClient-x86_64-windows.exe | grep "DLL Name" | head -20
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ../../ESurfingClient-x86_64-windows.exe || true
          
          echo "✅ Build completed"
          ls -lh ../../ESurfingClient-x86_64-windows.exe

      - name: Verify build output
        run: |
          if [ -f "ESurfingClient-x86_64-windows.exe" ]; then
              echo "✅ Build successful!"
              echo "📏 File size: $(stat -c%s ESurfingClient-x86_64-windows.exe) bytes"

              echo "🔍 Checking dependencies:"
              deps=$(x86_64-w64-mingw32-objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name" || true)
              echo "$deps" | head -20

              if echo "$deps" | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
                  echo "❌ ERROR: Found third-party DLL dependencies!"
                  echo "$deps" | grep -E "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
                  exit 1
              else
                  echo "✅ Fully static binary - no third-party DLLs"
              fi
          else
              echo "❌ Executable not found!"
              exit 1
          fi

      - name: Package with zip
        run: |
          zip -r esurfingclient-x86_64-windows.zip ESurfingClient-x86_64-windows.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-x86_64-windows
          path: esurfingclient-x86_64-windows.zip
          retention-days: 30