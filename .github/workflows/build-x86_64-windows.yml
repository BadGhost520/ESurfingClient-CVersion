name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-curl-winssl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-upx

      - name: Build ESurfingClient (Forced Static)
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing

          mkdir -p build && cd build

          # 查找静态库路径
          CURL_STATIC=$(find /mingw64/lib -name "libcurl.a" | head -1)
          SSL_STATIC=$(find /mingw64/lib -name "libssl.a" | head -1)
          CRYPTO_STATIC=$(find /mingw64/lib -name "libcrypto.a" | head -1)

          echo "CURL static: $CURL_STATIC"
          echo "SSL static: $SSL_STATIC"

          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCURL_STATICLIB=ON \
            -DCURL_LIBRARY="$CURL_STATIC" \
            -DOPENSSL_SSL_LIBRARY="$SSL_STATIC" \
            -DOPENSSL_CRYPTO_LIBRARY="$CRYPTO_STATIC" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
            ..

          mingw32-make -j$(nproc)

          # 验证没有 libcurl-4.dll
          if objdump -p ESurfingClient.exe | grep -q "libcurl-4.dll"; then
            echo "❌ Still has dynamic libcurl dependency!"
            objdump -p ESurfingClient.exe | grep "DLL Name"
            exit 1
          else
            echo "✅ Static build successful - no libcurl.dll dependency"
          fi

      - name: Strip and compress
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          
          echo "🛡️ Stripping debug symbols"
          strip --strip-all ESurfingClient-x86_64-windows.exe
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ESurfingClient-x86_64-windows.exe || echo "⚠️ UPX compression failed, continuing..."
          
          echo "📊 Final size: $(du -h ESurfingClient-x86_64-windows.exe | cut -f1)"
          
          # 移动到根目录
          cp ESurfingClient-x86_64-windows.exe ../../

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f "ESurfingClient-x86_64-windows.exe" ]; then
            echo "❌ Build failed: executable not found"
            exit 1
          fi
          
          echo "✅ Build successful!"
          echo "📏 File size: $(du -h ESurfingClient-x86_64-windows.exe | cut -f1)"
          
          # 检查依赖（应该只有系统 DLL）
          echo "🔍 Checking dependencies:"
          objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name" | grep -v "KERNEL32\|MSVCRT\|USER32\|ADVAPI32" || \
          echo "✅ Only system DLLs found (good)"


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESurfingClient-x86_64-windows
          path: ESurfingClient-x86_64-windows.exe
          retention-days: 30