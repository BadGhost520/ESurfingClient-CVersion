name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

#      - name: Install vcpkg
#        run: |
#          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
#          C:/vcpkg/bootstrap-vcpkg.bat
#
#      - name: Cache vcpkg
#        uses: actions/cache@v4
#        with:
#          path: |
#            C:/vcpkg/downloads
#            C:/vcpkg/installed
#            C:/vcpkg/buildtrees
#            C:/vcpkg/packages
#          key: vcpkg-${{ hashFiles('vcpkg.json') }}-${{ runner.os }}
#          restore-keys: |
#            vcpkg-${{ runner.os }}
#
#      - name: Install dependencies via vcpkg
#        shell: pwsh
#        run: |
#          C:/vcpkg/vcpkg install --triplet x64-mingw-static

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-upx

      - name: Build ESurfingClient
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring with Ninja"
          cmake -G Ninja \
            -B build \
            -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static
          
          echo "🔨 Building with Ninja"
          cmake --build build --target ESurfingClient -j
          
          echo "📦 Copying executable"
          cp build\ESurfingClient.exe ../../ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          dumpbin /dependents ../../ESurfingClient-x86_64-windows.exe | Select-String "DLL" | Select-Object -First 20
          
          echo "🗜️ Compressing with UPX"
          choco install upx -y
          upx --best --lzma ../../ESurfingClient-x86_64-windows.exe
          
          echo "✅ Build completed"
          ls -lh ../../ESurfingClient-x86_64-windows.exe

      - name: Verify build output
        shell: msys2 {0}
        run: |
          if (Test-Path "ESurfingClient-x86_64-windows.exe") {
            echo "✅ Build successful!"
            echo "📏 File size: $(Get-Item ESurfingClient-x86_64-windows.exe).Length bytes"
          
            $deps = dumpbin /dependents ESurfingClient-x86_64-windows.exe | Select-String "DLL"
            $badDlls = $deps | Select-String -Pattern "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
          
            if ($badDlls) {
              echo "❌ ERROR: Found third-party DLL dependencies!"
              echo $badDlls
              exit 1
            } else {
              echo "✅ Fully static binary - no third-party DLLs"
            }
          } else {
            echo "❌ Executable not found!"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30