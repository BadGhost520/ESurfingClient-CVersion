name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/downloads
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
            C:/vcpkg/packages
          key: vcpkg-${{ hashFiles('esurfingclient/esurfing/vcpkg.json') }}-${{ runner.os }}
          restore-keys: |
            vcpkg-${{ runner.os }}

      - name: Install dependencies via vcpkg
        shell: pwsh
        run: |
          cd esurfingclient/esurfing
          C:/vcpkg/vcpkg install --triplet x64-windows-static

      - name: Build ESurfingClient
        shell: pwsh
        run: |
          cd esurfingclient/esurfing
          
          $env:VCPKG_ROOT = "C:/vcpkg"
          
          echo "🔍 Checking vcpkg installed libraries"
          Get-ChildItem C:/vcpkg/installed/x64-windows-static/lib -Filter "*crypto*" | Select-Object Name
          Get-ChildItem C:/vcpkg/installed/x64-windows-static/lib -Filter "*ssl*" | Select-Object Name
          
          echo "⚙️ CMake configuring"
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCURL_STATICLIB=ON `
            -DOPENSSL_NO_DYNAMIC_ENGINE=ON `
            -DCURL_LIBRARY=C:/vcpkg/installed/x64-windows-static/lib/libcurl.lib `
            -DCURL_INCLUDE_DIR=C:/vcpkg/installed/x64-windows-static/include `
            -DOPENSSL_ROOT_DIR=C:/vcpkg/installed/x64-windows-static `
            -DOPENSSL_INCLUDE_DIR=C:/vcpkg/installed/x64-windows-static/include `
            -DOPENSSL_CRYPTO_LIBRARY=C:/vcpkg/installed/x64-windows-static/lib/libcrypto.lib `
            -DOPENSSL_SSL_LIBRARY=C:/vcpkg/installed/x64-windows-static/lib/libssl.lib `
            -DOPENSSL_LIBRARIES="C:/vcpkg/installed/x64-windows-static/lib/libcrypto.lib;C:/vcpkg/installed/x64-windows-static/lib/libssl.lib"
          
          cmake --build build --config Release --target ESurfingClient -j
          
          echo "📦 Copying executable"
          copy build\Release\ESurfingClient.exe ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          dumpbin /dependents ESurfingClient-x86_64-windows.exe | Select-String "DLL" | Select-Object -First 20
          
          echo "🗜️ Compressing with UPX"
          choco install upx -y
          upx --best --lzma ESurfingClient-x86_64-windows.exe
          
          echo "✅ Build completed"
          ls -lh ESurfingClient-x86_64-windows.exe

      - name: Verify build output
        shell: pwsh
        run: |
          cd esurfingclient/esurfing
          
          if (Test-Path "ESurfingClient-x86_64-windows.exe") {
            echo "✅ Build successful!"
            echo "📏 File size: $(Get-Item ESurfingClient-x86_64-windows.exe).Length bytes"
          
            $deps = dumpbin /dependents ESurfingClient-x86_64-windows.exe | Select-String "DLL"
            $badDlls = $deps | Select-String -Pattern "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
          
            if ($badDlls) {
              echo "❌ ERROR: Found third-party DLL dependencies!"
              echo $badDlls
              exit 1
            } else {
              echo "✅ Fully static binary - no third-party DLLs"
            }
          } else {
            echo "❌ Executable not found!"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30