name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-upx
            make
            tar
            wget

      - name: Build libcurl (static, minimal)
        shell: msys2 {0}
        run: |
          cd $GITHUB_WORKSPACE
          wget https://curl.se/download/curl-8.8.0.tar.gz
          tar -xzf curl-8.8.0.tar.gz
          cd curl-8.8.0

          ./configure --prefix=/mingw64 \
                      --host=x86_64-w64-mingw32 \
                      --build=x86_64-w64-mingw32 \
                      --enable-static \
                      --disable-shared \
                      --with-openssl \
                      --without-librtmp \
                      --without-ldap \
                      --without-ldaps \
                      --without-brotli \
                      --without-zstd \
                      --without-libpsl \
                      --without-libssh2 \
                      --without-nghttp2 \
                      --without-nghttp3 \
                      --without-ngtcp2 \
                      --without-libidn2 \
                      --disable-rtmp \
                      --disable-ldap \
                      --disable-ldaps \
                      --disable-rtsp \
                      --disable-dict \
                      --disable-telnet \
                      --disable-tftp \
                      --disable-pop3 \
                      --disable-imap \
                      --disable-smb \
                      --disable-smtp \
                      --disable-gopher \
                      --disable-mqtt \
                      --disable-ftp \
                      --disable-file \
                      --disable-unix-sockets

          mingw32-make -j$(nproc)
          mingw32-make install

          echo "✅ Minimal libcurl built and installed"
          ls -la /mingw64/lib/libcurl.a

      - name: Build ESurfingClient
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring with Ninja"
          cmake -G Ninja \
            -B build \
            -S . \
            -DCMAKE_BUILD_TYPE=Release
          
          echo "🔨 Building with Ninja"
          cmake --build build --target ESurfingClient -j
          
          echo "📦 Copying executable"
          cp build/ESurfingClient.exe ../../ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          objdump -p ../../ESurfingClient-x86_64-windows.exe | grep "DLL Name" | head -20
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ../../ESurfingClient-x86_64-windows.exe
          
          echo "✅ Build completed"
          ls -lh ../../ESurfingClient-x86_64-windows.exe

      - name: Verify build output
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing

          if [ -f "ESurfingClient-x86_64-windows.exe" ]; then
              echo "✅ Build successful!"
              echo "📏 File size: $(stat -c%s ESurfingClient-x86_64-windows.exe) bytes"

              echo "🔍 Checking dependencies:"
              deps=$(objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name")
              echo "$deps" | head -20

              if echo "$deps" | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
                  echo "❌ ERROR: Found third-party DLL dependencies!"
                  echo "$deps" | grep -E "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
                  exit 1
              else
                  echo "✅ Fully static binary - no third-party DLLs"
              fi
          else
              echo "❌ Executable not found!"
              exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30