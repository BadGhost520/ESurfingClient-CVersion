name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: microsoft/setup-msbuild@v2
        with:
          vcpkgDirectory: 'C:/vcpkg'
          vcpkgGitCommit: 'latest'

      - name: Install dependencies with vcpkg
        run: |
          vcpkg install curl:x64-windows-static
          vcpkg install openssl:x64-windows-static
          vcpkg install zlib:x64-windows-static
          vcpkg install libssh2:x64-windows-static
          vcpkg install nghttp2:x64-windows-static
          vcpkg install zstd:x64-windows-static
          vcpkg install libidn2:x64-windows-static
          vcpkg install libpsl:x64-windows-static
          vcpkg install brotli:x64-windows-static
          vcpkg install libunistring:x64-windows-static
          vcpkg install libiconv:x64-windows-static

      - name: Build ESurfingClient
        shell: msys2 {0}
        run: |
          echo "🏗️ Starting Windows x64 build process"
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring"
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release `
            -DCURL_STATICLIB=ON `
            -DOPENSSL_NO_DYNAMIC_ENGINE=ON `
            -DCMAKE_EXE_LINKER_FLAGS="/STATIC"
          
          echo "🔨 Building"
          cmake --build build --config Release --target ESurfingClient
          
          echo "📦 Renaming executable"
          copy build\Release\ESurfingClient.exe ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          echo "Dependencies (should show only system DLLs):"
          objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name" || echo "No DLL dependencies found"
          dumpbin /dependents ESurfingClient-x86_64-windows.exe || echo "dumpbin not available"
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ESurfingClient-x86_64-windows.exe
          
          echo "✅ Build completed"

      - name: Verify build output
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          if [ ! -f "ESurfingClient-x86_64-windows.exe" ]; then
            echo "❌ Executable not found"
            exit 1
          fi
          
          echo "✅ Build successful!"
          echo "📏 File size: $(stat -c%s ESurfingClient-x86_64-windows.exe) bytes"
          
          # 验证没有第三方 DLL 依赖
          if objdump -p ESurfingClient-x86_64-windows.exe | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
            echo "❌ ERROR: Found third-party DLL dependencies!"
            exit 1
          else
            echo "✅ Fully static binary - no third-party DLLs"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30