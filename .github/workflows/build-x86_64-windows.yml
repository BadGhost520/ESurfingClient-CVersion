name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      full_version:
        required: true
        type: string

jobs:
  build-windows-x86_64:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="cmake make ninja-build gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 mingw-w64-tools upx-ucl wget file zip perl libperl-dev"

          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 创建工具链
        run: |
          cd esurfingclient/esurfing
          
          cat > toolchain-mingw64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
          
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          
          cat toolchain-mingw64.cmake

      - name: 构建 libOpenSSL 静态链接库
        run: |
          cd /tmp
          wget https://github.com/openssl/openssl/releases/download/openssl-4.0.0/openssl-4.0.0.tar.gz
          tar -xzf openssl-4.0.0.tar.gz
          cd openssl-4.0.0
          
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=/usr/x86_64-w64-mingw32 \
            --libdir=lib \
            no-shared \
            no-tests \
            no-docs \
            no-apps \
            no-ssl \
            no-tls \
            no-bf \
            no-cast \
            no-idea \
            no-rc2 \
            no-rc4 \
            no-rc5 \
            no-seed \
            no-aria \
            no-camellia \
            no-sm2 \
            no-sm3 \
            no-mdc2 \
            no-rmd160 \
            no-whirlpool \
            no-blake2 \
            no-md4 \
            no-dtls \
            no-quic \
            no-sctp \
            no-srp \
            no-zlib \
            no-zstd \
            no-brotli \
            no-ktls \
            no-rdrand \
            no-asan \
            no-msan \
            no-ubsan \
            no-trace \
            no-egd \
            no-krb5kdf \
            no-scrypt \
            no-x942kdf \
            no-x963kdf \
            no-srtp \
            no-ocsp \
            no-cms \
            no-ts
          
          make -j$(nproc)
          make install

      - name: 构建 libcurl 静态链接库
        run: |
          cd /tmp
          wget https://curl.se/download/curl-8.20.0.tar.gz
          tar -xzf curl-8.20.0.tar.gz
          cd curl-8.20.0
          
          ./configure --host=x86_64-w64-mingw32 \
            --prefix=/usr/x86_64-w64-mingw32 \
            --enable-static \
            --disable-shared \
            --without-ssl \
            --enable-http \
            --enable-proxy \
            --enable-cookies \
            --enable-basic-auth \
            --enable-digest-auth \
            --disable-ftp \
            --disable-file \
            --disable-ldap \
            --disable-ldaps \
            --disable-rtsp \
            --disable-dict \
            --disable-telnet \
            --disable-tftp \
            --disable-pop3 \
            --disable-imap \
            --disable-smb \
            --disable-smtp \
            --disable-gopher \
            --disable-mqtt \
            --disable-websockets \
            --disable-bearer-auth \
            --disable-kerberos-auth \
            --disable-negotiate-auth \
            --disable-ntlm \
            --disable-tls-srp \
            --disable-aws \
            --disable-rtmp \
            --without-brotli \
            --without-zstd \
            --without-libpsl \
            --without-libssh2 \
            --without-librtmp \
            --without-libidn2 \
            --without-nghttp2 \
            --without-ngtcp2 \
            --without-nghttp3 \
            --without-quiche \
            --without-msh3 \
            --without-libgsasl \
            --without-libssh \
            --without-wolfssh \
            --without-hyper \
            --without-zlib \
            --disable-ares \
            --disable-rt \
            --disable-threaded-resolver \
            --disable-ipv6 \
            --disable-manual \
            --disable-docs \
            --disable-verbose \
            --disable-versioned-symbols \
            --disable-sspi
          
          make -j$(nproc)
          make install

      - name: 构建 ESurfingClient 程序
        run: |
          cd esurfingclient/esurfing
          
          cmake -G Ninja \
            -B build \
            -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw64.cmake \
            -DBUILD_SHARED_LIBS=OFF
          
          cmake --build build --target ESurfingClient -j$(nproc)
          
          cp build/ESurfingClient.exe ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe
          
          x86_64-w64-mingw32-objdump -p ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe | grep "DLL Name" | head -20
          
          upx --best --lzma ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe || true
          
          ls -lh ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe

      - name: 验证
        run: |
          if [ -f "ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe" ]; then
              echo "✅ 构建成功"
              echo "📏 文件大小: $(stat -c%s ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe) bytes"

              echo "🔍 检查依赖:"
              deps=$(x86_64-w64-mingw32-objdump -p ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe | grep "DLL Name" || true)
              echo "$deps" | head -20

              if echo "$deps" | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
                  echo "❌ 错误: 链接了第三方动态库"
                  echo "$deps" | grep -E "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
                  exit 1
              else
                  echo "✅ 完全静态: 没有链接第三方动态库"
              fi
          else
              echo "❌ 未找到二进制文件"
              exit 1
          fi

      - name: 打包成 zip 压缩包
        run: |
          zip -r esurfingclient-${{ inputs.full_version }}-windows-x86_64.zip ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-${{ inputs.full_version }}-windows-x86_64
          path: esurfingclient-${{ inputs.full_version }}-windows-x86_64.zip
          retention-days: 30