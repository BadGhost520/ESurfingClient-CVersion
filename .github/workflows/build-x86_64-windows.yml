name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: microsoft/setup-msbuild@v2
        with:
          vcpkgDirectory: 'C:/vcpkg'
          vcpkgGitCommit: 'latest'

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/downloads
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-

      - name: Build ESurfingClient
        shell: pwsh
        run: |
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring with vcpkg"
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release `
            -DCURL_STATICLIB=ON `
            -DOPENSSL_NO_DYNAMIC_ENGINE=ON
          
          echo "🔨 Building"
          cmake --build build --config Release --target ESurfingClient -j
          
          echo "📦 Copying executable"
          copy build\Release\ESurfingClient.exe ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          echo "Dependencies (should show only system DLLs):"
          dumpbin /dependents ESurfingClient-x86_64-windows.exe | Select-String "DLL" | Select-Object -First 20
          
          echo "🗜️ Compressing with UPX (if available)"
          where upx > $null 2>&1
          if ($LASTEXITCODE -eq 0) {
            upx --best --lzma ESurfingClient-x86_64-windows.exe
          } else {
            echo "UPX not found, skipping compression"
          }
          
          echo "✅ Build completed"
          ls -lh ESurfingClient-x86_64-windows.exe

      - name: Verify build output
        shell: pwsh
        run: |
          cd esurfingclient/esurfing
          
          if (Test-Path "ESurfingClient-x86_64-windows.exe") {
            echo "✅ Build successful!"
            echo "📏 File size: $(Get-Item ESurfingClient-x86_64-windows.exe).Length bytes"
          
            # 验证没有第三方 DLL 依赖
            $deps = dumpbin /dependents ESurfingClient-x86_64-windows.exe | Select-String "DLL"
            $badDlls = $deps | Select-String -Pattern "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
          
            if ($badDlls) {
              echo "❌ ERROR: Found third-party DLL dependencies!"
              echo $badDlls
              exit 1
            } else {
              echo "✅ Fully static binary - no third-party DLLs"
            }
          } else {
            echo "❌ Executable not found!"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30