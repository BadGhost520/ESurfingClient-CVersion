name: Build x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-x64-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-nghttp2
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-libpsl
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-libunistring
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-upx

      - name: Build libcurl (static, minimal)
        shell: msys2 {0}
        run: |
          cd $GITHUB_WORKSPACE
          wget https://curl.se/download/curl-8.8.0.tar.gz
          tar -xzf curl-8.8.0.tar.gz
          cd curl-8.8.0

          # 配置一个最小化的 libcurl（禁用几乎所有可选功能）
          ./configure --prefix=/mingw64 \
                      --enable-static \
                      --disable-shared \
                      --disable-dependency-tracking \
                      --with-schannel \
                      --without-librtmp \
                      --without-ldap \
                      --without-ldaps \
                      --without-brotli \
                      --without-zstd \
                      --without-libpsl \
                      --without-libssh2 \
                      --without-nghttp2 \
                      --without-libidn2 \
                      --disable-rtmp \
                      --disable-ldap \
                      --disable-ldaps \
                      --disable-rtsp \
                      --disable-dict \
                      --disable-telnet \
                      --disable-tftp \
                      --disable-pop3 \
                      --disable-imap \
                      --disable-smb \
                      --disable-smtp \
                      --disable-gopher \
                      --disable-mqtt \
                      --disable-ftp \
                      --disable-file \
                      --disable-unix-sockets

          mingw32-make -j$(nproc)
          mingw32-make install

          # 备份原来的 libcurl.a，用新编译的替换
          mv /mingw64/lib/libcurl.a /mingw64/lib/libcurl.a.bak || true
          cp lib/.libs/libcurl.a /mingw64/lib/libcurl.a
          echo "✅ Minimal libcurl built and installed"

      - name: Build ESurfingClient
        shell: msys2 {0}
        run: |
          echo "🏗️ Starting Windows x64 build process"
          cd esurfingclient/esurfing
          
          echo "⚙️ CMake configuring"
          cmake -G "MinGW Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCURL_LIBRARY=/mingw64/lib/libcurl.a \
                -DCURL_INCLUDE_DIR=/mingw64/include \
                -DOPENSSL_SSL_LIBRARY=/mingw64/lib/libssl.a \
                -DOPENSSL_CRYPTO_LIBRARY=/mingw64/lib/libcrypto.a \
                -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
                -DCMAKE_C_FLAGS="-DCURL_STATICLIB" \
                .
          
          echo "🔨 Building"
          mingw32-make -j$(nproc)
          
          echo "📦 Renaming executable"
          mv ESurfingClient.exe ESurfingClient-x86_64-windows.exe
          
          echo "🔍 Verifying static linking"
          echo "Dependencies (should show only system DLLs):"
          objdump -p ESurfingClient-x86_64-windows.exe | grep "DLL Name" || echo "No DLL dependencies found"
          
          echo "🗜️ Compressing with UPX"
          upx --best --lzma ESurfingClient-x86_64-windows.exe
          
          echo "✅ Build completed"

      - name: Verify build output
        shell: msys2 {0}
        run: |
          cd esurfingclient/esurfing
          if [ ! -f "ESurfingClient-x86_64-windows.exe" ]; then
            echo "❌ Executable not found"
            exit 1
          fi
          
          echo "✅ Build successful!"
          echo "📏 File size: $(stat -c%s ESurfingClient-x86_64-windows.exe) bytes"
          
          # 验证没有第三方 DLL 依赖
          if objdump -p ESurfingClient-x86_64-windows.exe | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
            echo "❌ ERROR: Found third-party DLL dependencies!"
            exit 1
          else
            echo "✅ Fully static binary - no third-party DLLs"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esurfingclient-windows-x64
          path: esurfingclient/esurfing/ESurfingClient-x86_64-windows.exe
          retention-days: 30