name: Build OpenWrt ramips_mt7621 APK

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release:
        required: true
        type: string
      sdk_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 更新 Makefile 版本号
        run: |
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ inputs.version }}/" esurfingclient/Makefile
          sed -i "s/PKG_RELEASE:=.*/PKG_RELEASE:=${{ inputs.release }}/" esurfingclient/Makefile

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          
          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 下载并解压 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          tar -I zstd -xf openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64 openwrt-sdk
          
          cd openwrt-sdk
          
          make defconfig

      - name: 获取 OpenWrt 缓存
        id: cache-openwrt
        uses: actions/cache@v5
        with:
          path: |
            openwrt-sdk/staging_dir/
            openwrt-sdk/dl/
          key: openwrt-ramips_mt7621-sdk-${{ inputs.sdk_version }}

      - name: 准备构建配置
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk

          scripts/feeds update base
          scripts/feeds update packages
          
          scripts/feeds install openssl
          scripts/feeds install curl
          
          cat >> .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          # CONFIG_LIBCURL_FTP is not set
          # CONFIG_LIBCURL_MBEDTLS is not set
          # CONFIG_LIBCURL_NGHTTP2 is not set
          CONFIG_LIBCURL_OPENSSL=y
          # CONFIG_OPENSSL_WITH_CHACHA_POLY1305 is not set
          # CONFIG_OPENSSL_WITH_CMS is not set
          # CONFIG_OPENSSL_WITH_IDEA is not set
          # CONFIG_OPENSSL_WITH_MDC2 is not set
          # CONFIG_OPENSSL_WITH_PSK is not set
          # CONFIG_OPENSSL_WITH_SEED is not set
          # CONFIG_OPENSSL_WITH_SRP is not set
          # CONFIG_OPENSSL_WITH_WHIRLPOOL is not set
          CONFIG_PACKAGE_libatomic=y
          CONFIG_PACKAGE_libcurl=y
          CONFIG_PACKAGE_libopenssl=y
          # CONFIG_PACKAGE_libopenssl-afalg is not set
          # CONFIG_PACKAGE_libopenssl-afalg_sync is not set
          # CONFIG_PACKAGE_libopenssl-devcrypto is not set
          EOF

          make defconfig

      - name: 编译 libopenssl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/openssl/compile V=sc -j$(nproc)

      - name: 编译 libcurl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/curl/compile V=sc -j$(nproc)

      - name: 编译 esurfingclient
        run: |
          cp -r esurfingclient openwrt-sdk/package/
          
          cd openwrt-sdk
          
          scripts/feeds install esurfingclient
          
          make package/esurfingclient/compile V=sc -j$(nproc)

          find bin/packages -name "esurfingclient*.ipk" -exec cp {} ../esurfingclient_${{ inputs.version }}-${{ inputs.release }}_ramips_mt7621.ipk \;

      - name: 复制可调试的二进制文件
        run: |
          cd openwrt-sdk
          find build_dir -name "ESurfingClient" -type f -exec cp {} ../ESurfingClient-openwrt-ramips_mt7621-debug \;
          file ../ESurfingClient-openwrt-ramips_mt7621-debug

      - name: 打包成 tar.gz 压缩包
        run: |
          mkdir test
          cp ESurfingClient-openwrt-ramips_mt7621-debug test/
          cp esurfingclient_${{ inputs.version }}-${{ inputs.release }}_ramips_mt7621.ipk test/
          tar -czf esurfingclient-openwrt-ramips_mt7621.tar.gz test

      - name: 上传工件
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-openwrt-ramips_mt7621
          path: esurfingclient-openwrt-ramips_mt7621.tar.gz
          retention-days: 30