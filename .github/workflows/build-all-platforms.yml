name: Build All Platforms

permissions:
  actions: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要构建的平台'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - windows-x86_64
          - linux-x86_64
          - openwrt-x86_64
          - openwrt-ramips_mt7621
          - openwrt-mediatek_filogic

jobs:
  # 获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      release: ${{ steps.extract.outputs.release }}
      full_version: ${{ steps.extract.outputs.full_version }}
    steps:
      - name: 签出到库
        uses: actions/checkout@v6

      - name: 从 CMakeLists.txt 获取版本号
        id: extract
        run: |
          cd esurfingclient/esurfing
          
          MAJOR=$(grep -oP 'set\(PROGRAM_VERSION_MAJOR \K\d+' CMakeLists.txt)
          MINOR=$(grep -oP 'set\(PROGRAM_VERSION_MINOR \K\d+' CMakeLists.txt)
          PATCH=$(grep -oP 'set\(PROGRAM_VERSION_PATCH \K\d+' CMakeLists.txt)
          RELEASE=$(grep -oP 'set\(PROGRAM_VERSION_RELEASE \K\d+' CMakeLists.txt)
        
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "full_version=${MAJOR}.${MINOR}.${PATCH}-r${RELEASE}" >> $GITHUB_OUTPUT

      - name: 展示版本号
        run: |
          echo "Version: ${{ steps.extract.outputs.full_version }}"
          echo "Release: ${{ steps.extract.outputs.release }}"

  # 根据选择条件性运行子 workflow
  windows:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-x86_64'
    uses: ./.github/workflows/build-x86_64-windows.yml
    secrets: inherit

  linux:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-x86_64'
    uses: ./.github/workflows/build-x86_64-linux.yml
    secrets: inherit

  openwrt_x86:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-x86_64'
    uses: ./.github/workflows/build-openwrt-x86_64.yml
    secrets: inherit

  openwrt_mt7621:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-ramips_mt7621'
    uses: ./.github/workflows/build-openwrt-ramips_mt7621.yml
    secrets: inherit

  openwrt_filogic:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-mediatek_filogic'
    uses: ./.github/workflows/build-openwrt-mediatek_filogic.yml
    secrets: inherit

  # 收集所有产物并创建 Release
  release:
    needs:
      - windows
      - linux
      - openwrt_x86
      - openwrt_mt7621
      - openwrt_filogic
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: 下载所有工件
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: 列出所有下载的文件
        run: |
          echo "已下载工件:"
          find artifacts -type f \( -name "*.zip" -o -name "*.ipk" -o -name "*.tar.gz" \) | sort

      - name: 创建 Release 包
        run: |
          export TZ='Asia/Shanghai'
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          RELEASE_TAG="build-${TIMESTAMP}"
          RELEASE_NAME="ESurfing Client Build - $(date +'%Y-%m-%d %H:%M:%S CST')"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release name: ${RELEASE_NAME}"
          
          mkdir -p release_package
          
          find artifacts -type f \( -name "*.zip" -o -name "*.ipk" -o -name "*.tar.gz" \) -exec cp {} release_package/ \;
          
          cd release_package
          zip -r "../${RELEASE_TAG}.zip" .
          cd ..
          
          echo "已创建压缩包: ${RELEASE_TAG}.zip"
          ls -lh "${RELEASE_TAG}.zip"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.RELEASE_TAG }}.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}