name: Build All Platforms

permissions:
  actions: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要构建的平台'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - windows-x86_64
          - linux-x86_64
          - openwrt-x86_64
          - openwrt-ramips_mt7621
          - openwrt-mediatek_filogic

jobs:
  # 根据选择条件性运行子 workflow
  windows:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-x86_64'
    uses: ./.github/workflows/build-x86_64-windows.yml
    secrets: inherit

  linux:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-x86_64'
    uses: ./.github/workflows/build-x86_64-linux.yml
    secrets: inherit

  openwrt_x86:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-x86_64'
    uses: ./.github/workflows/build-openwrt-x86_64.yml
    secrets: inherit

  openwrt_mt7621:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-ramips_mt7621'
    uses: ./.github/workflows/build-openwrt-ramips_mt7621.yml
    secrets: inherit

  openwrt_filogic:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-mediatek_filogic'
    uses: ./.github/workflows/build-openwrt-mediatek_filogic.yml
    secrets: inherit

  # 收集所有产物并创建 Release
  release:
    needs:
      - windows
      - linux
      - openwrt_x86
      - openwrt_mt7621
      - openwrt_filogic
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "📦 Downloaded artifacts:"
          find artifacts -type f -name "*.zip" -o -name "*.ipk" -o -name "*.tar.gz" | sort

      - name: Create release package
        run: |
          export TZ='Asia/Shanghai'
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          RELEASE_TAG="build-${TIMESTAMP}"
          RELEASE_NAME="ESurfing Client Build - $(date +'%Y-%m-%d %H:%M:%S CST')"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV

          echo "🏷️ Release tag: ${RELEASE_TAG}"
          echo "📝 Release name: ${RELEASE_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: artifacts/**/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}